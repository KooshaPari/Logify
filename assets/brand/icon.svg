<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Logify — logging &amp; observability">
  <defs>
    <linearGradient id="lg-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/>
      <stop offset="1" stop-color="#090a0c"/>
    </linearGradient>
    <linearGradient id="lg-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2228"/>
      <stop offset="1" stop-color="#0d1216"/>
    </linearGradient>
    <linearGradient id="lg-stream" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#7ebab5"/>
    </linearGradient>
    <linearGradient id="lg-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="lg-margin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <radialGradient id="lg-glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="lg-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="lg-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- canvas -->
  <rect x="0" y="0" width="512" height="512" rx="96" ry="96" fill="url(#lg-bg)"/>

  <!-- glow halo -->
  <circle cx="256" cy="256" r="220" fill="url(#lg-glow)"/>

  <!-- hexagonal frame -->
  <g filter="url(#lg-shadow)">
    <polygon points="256,72 408,160 408,352 256,440 104,352 104,160"
             fill="url(#lg-frame)" stroke="#06b6d4" stroke-opacity="0.35" stroke-width="2"/>
  </g>

  <!-- inner glass panel -->
  <polygon points="256,108 376,178 376,334 256,404 136,334 136,178"
           fill="#0a0e12" fill-opacity="0.55" stroke="#06b6d4" stroke-opacity="0.18" stroke-width="1"/>

  <!-- timestamp gutter -->
  <g>
    <line x1="172" y1="148" x2="172" y2="380" stroke="url(#lg-margin)" stroke-width="2" stroke-opacity="0.7"/>
    <circle cx="172" cy="148" r="3" fill="#06b6d4"/>
    <circle cx="172" cy="200" r="2" fill="#06b6d4" fill-opacity="0.7"/>
    <circle cx="172" cy="252" r="2" fill="#06b6d4" fill-opacity="0.7"/>
    <circle cx="172" cy="304" r="2" fill="#06b6d4" fill-opacity="0.7"/>
    <circle cx="172" cy="356" r="2" fill="#06b6d4" fill-opacity="0.7"/>
  </g>

  <!-- prompt chevron -->
  <g>
    <polygon points="190,200 204,212 190,224" fill="#7ebab5"/>
    <polygon points="210,200 224,212 210,224" fill="#7ebab5" fill-opacity="0.6"/>
  </g>

  <!-- streaming log lines -->
  <g>
    <rect x="236" y="184" width="120" height="6" rx="3" fill="url(#lg-line)"/>
    <rect x="236" y="204" width="92"  height="6" rx="3" fill="url(#lg-line)" opacity="0.85"/>
    <rect x="236" y="224" width="140" height="6" rx="3" fill="url(#lg-line)" opacity="0.75"/>

    <rect x="190" y="256" width="186" height="6" rx="3" fill="url(#lg-line)"/>
    <rect x="190" y="276" width="120" height="6" rx="3" fill="url(#lg-line)" opacity="0.85"/>
    <rect x="190" y="296" width="160" height="6" rx="3" fill="url(#lg-line)" opacity="0.7"/>

    <rect x="190" y="328" width="100" height="6" rx="3" fill="url(#lg-line)" opacity="0.8"/>
    <rect x="190" y="348" width="140" height="6" rx="3" fill="url(#lg-line)" opacity="0.6"/>
  </g>

  <!-- stream highlight top -->
  <rect x="236" y="184" width="40" height="6" rx="3" fill="#7ebab5" opacity="0.9" filter="url(#lg-soft)"/>

  <!-- corner ticks -->
  <g stroke="#06b6d4" stroke-width="2" stroke-linecap="round" opacity="0.5">
    <line x1="128" y1="180" x2="142" y2="180"/>
    <line x1="128" y1="180" x2="128" y2="194"/>
    <line x1="384" y1="180" x2="370" y2="180"/>
    <line x1="384" y1="180" x2="384" y2="194"/>
    <line x1="128" y1="332" x2="128" y2="318"/>
    <line x1="128" y1="332" x2="142" y2="332"/>
    <line x1="384" y1="332" x2="384" y2="318"/>
    <line x1="384" y1="332" x2="370" y2="332"/>
  </g>
</svg>
